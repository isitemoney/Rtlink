<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daring Money | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: #050b1a; color: #e2e8f0; margin: 0; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: all 0.2s; }
        input, select { background: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; }
    </style>
</head>
<body>

<div id="loading-screen" class="hidden fixed inset-0 z-[100] bg-[#050b1a] flex flex-col items-center justify-center text-center">
    <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-blue-500 mb-4"></div>
    <p class="text-blue-400 font-bold italic">جاري التحويل وتوثيق النقرة...</p>
</div>

<nav id="nav" class="hidden glass-card sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b border-white/5">
    <div class="flex flex-col text-right">
        <h1 class="text-xl font-black italic">DARING <span class="text-blue-500">MONEY</span></h1>
        <p id="welcome-msg" class="text-[10px] text-slate-400 font-bold italic"></p>
    </div>
    <div class="flex gap-2">
        <a href="https://t.me/eruuiyl" target="_blank" class="bg-blue-500/20 text-blue-400 px-3 py-2 rounded-xl text-[10px] font-bold border border-blue-500/30">الدعم</a>
        <button onclick="logout()" class="bg-red-500/20 text-red-400 px-4 py-2 rounded-xl text-xs font-black">خروج</button>
    </div>
</nav>

<div id="auth-section" class="min-h-screen flex items-center justify-center p-4">
    <div class="glass-card p-8 rounded-[2.5rem] w-full max-w-md border-t-4 border-blue-500 shadow-2xl text-center">
        <h2 class="text-3xl font-black mb-8 italic">DARING <span class="text-blue-500">MONEY</span></h2>
        <div class="space-y-4">
            <input type="text" id="username" placeholder="اسم المستخدم" class="hidden w-full p-4 rounded-2xl outline-none text-right font-bold border">
            <input type="email" id="email" placeholder="البريد الإلكتروني" class="w-full p-4 rounded-2xl outline-none text-left border">
            <input type="password" id="password" placeholder="كلمة المرور" class="w-full p-4 rounded-2xl outline-none text-left border">
            <button onclick="handleAuth()" id="auth-btn" class="btn-primary w-full py-4 rounded-2xl font-black text-lg text-white">دخول</button>
            <p onclick="toggleAuthMode()" id="auth-switch" class="text-xs text-slate-500 underline cursor-pointer">إنشاء حساب جديد</p>
        </div>
    </div>
</div>

<div id="dashboard-section" class="hidden max-w-5xl mx-auto p-4 space-y-6">
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 text-center">
        <div class="glass-card p-4 rounded-2xl border-b-2 border-blue-500">
            <p class="text-blue-400 text-[10px] font-black italic">أرباح اليوم</p>
            <h3 id="stat-today" class="text-2xl text-white">$0.00</h3>
        </div>
        <div class="glass-card p-4 rounded-2xl">
            <p class="text-slate-400 text-[10px] font-black italic">إجمالي الأرباح</p>
            <h3 id="stat-total" class="text-2xl text-white">$0.00</h3>
        </div>
        <div class="glass-card p-4 rounded-2xl border-b-2 border-emerald-500">
            <p class="text-emerald-400 text-[10px] font-black italic">قابل للسحب</p>
            <h3 id="stat-withdrawable" class="text-2xl text-emerald-400">$0.00</h3>
        </div>
        <div class="glass-card p-4 rounded-2xl">
            <p class="text-purple-400 text-[10px] font-black italic">النقرات</p>
            <h3 id="stat-clicks" class="text-2xl text-white">0</h3>
        </div>
    </div>

    <div class="glass-card p-6 rounded-[2.5rem] border-r-4 border-blue-500">
        <h4 class="font-bold text-xs text-blue-400 mb-4 italic">🔗 رابطك التسويقي</h4>
        <div class="flex gap-2 bg-slate-950 p-1 rounded-2xl">
            <input id="ref-link" readonly class="w-full bg-transparent p-3 text-[10px] outline-none text-blue-300 font-bold">
            <button onclick="copyReferralLink()" class="btn-primary px-6 rounded-xl font-black text-xs text-white">نسخ</button>
        </div>
    </div>

    <div class="glass-card p-6 rounded-[2.5rem] border-r-4 border-emerald-500">
        <h4 class="font-bold text-sm text-emerald-400 mb-6 italic">💰 طلب سحب</h4>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <select id="w-method" class="p-4 rounded-2xl text-xs font-bold outline-none">
                <option value="زين كاش">زين كاش</option>
                <option value="رصيد آسيا">رصيد آسيا</option>
                <option value="USDT">USDT (TRC20)</option>
            </select>
            <input type="text" id="w-account" placeholder="رقم الحساب" class="p-4 rounded-2xl text-xs text-right font-bold outline-none">
            <input type="number" id="w-amount" placeholder="المبلغ (الأدنى 7$)" class="p-4 rounded-2xl text-xs text-right font-bold outline-none">
            <input type="text" id="w-contact" placeholder="يوزر التليجرام" class="p-4 rounded-2xl text-xs text-right font-bold outline-none">
        </div>
        <button onclick="confirmWithdraw()" class="btn-primary w-full py-4 mt-4 rounded-2xl font-black text-white">تأكيد السحب</button>
    </div>

    <div id="user-withdraw-history" class="space-y-3"></div>
</div>

<div id="admin-panel" class="hidden max-w-5xl mx-auto p-4 py-10 border-t border-red-500/20 space-y-6">
    <div class="glass-card p-6 rounded-[2.5rem] border border-blue-500/30">
        <h2 class="text-xl font-black text-blue-400 mb-4">إدارة الرابط</h2>
        <div class="flex gap-2">
            <input type="text" id="admin-new-link" placeholder="الرابط الجديد..." class="w-full p-4 rounded-2xl text-xs font-bold outline-none">
            <button onclick="updateGlobalLink()" class="btn-primary px-6 rounded-2xl font-black text-xs text-white">تحديث</button>
        </div>
        <p id="current-link-display" class="mt-4 text-[10px] text-emerald-400 font-mono italic"></p>
    </div>
    <div id="admin-withdrawals" class="space-y-4"></div>
</div>

<script>
// السكربت الخاص بك مدمج بالكامل هنا
const firebaseConfig = {
    apiKey: "AIzaSyCnkJf-6sAeRJpm34yXLmklLwSxM-GJvUc",
    authDomain: "my-dash-c78e3.firebaseapp.com",
    databaseURL: "https://my-dash-c78e3-default-rtdb.firebaseio.com",
    projectId: "my-dash-c78e3",
    storageBucket: "my-dash-c78e3.firebasestorage.app",
    messagingSenderId: "137154835768",
    appId: "1:137154835768:web:7f396782de1300f9bdfdcd"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

const ADMIN_EMAILS = ["xxetali46@gmail.com", "xxetali47@gmail.com"];
const CLICK_COMMISSION = 0.02;
let GLOBAL_REDIRECT_LINK = "https://hp.funroom.store/a/8nw6emt2";

db.ref('settings/redirectLink').on('value', snap => {
    if (snap.val()) {
        GLOBAL_REDIRECT_LINK = snap.val();
        const display = document.getElementById('current-link-display');
        if (display) display.innerText = "الرابط النشط: " + GLOBAL_REDIRECT_LINK;
    }
});

function updateGlobalLink() {
    const newLink = document.getElementById('admin-new-link').value.trim();
    if (!newLink.startsWith('http')) return showNotification("الرابط غير صالح", "blue");
    db.ref('settings').update({ redirectLink: newLink }).then(() => {
        showNotification("تم تحديث الرابط ✅", "green");
        document.getElementById('admin-new-link').value = "";
    });
}

function checkAndRedirect() {
    const params = new URLSearchParams(window.location.search);
    const refId = params.get("ref");
    if (!refId) return;
    document.getElementById('loading-screen').classList.remove('hidden');
    const deviceKey = "ref_click_" + refId;
    if (localStorage.getItem(deviceKey)) {
        setTimeout(() => { window.location.href = GLOBAL_REDIRECT_LINK; }, 500);
        return;
    }
    db.ref('users/' + refId).transaction(user => {
        if (user) {
            user.clicks = (user.clicks || 0) + 1;
            user.todayBalance = Number(((user.todayBalance || 0) + CLICK_COMMISSION).toFixed(2));
            user.totalBalance = Number(((user.totalBalance || 0) + CLICK_COMMISSION).toFixed(2));
        }
        return user;
    }).then(() => {
        localStorage.setItem(deviceKey, "counted");
        setTimeout(() => { window.location.href = GLOBAL_REDIRECT_LINK; }, 1000);
    }).catch(() => { window.location.href = GLOBAL_REDIRECT_LINK; });
}

function showNotification(msg, type = "blue") {
    const div = document.createElement("div");
    div.className = `fixed bottom-10 left-1/2 -translate-x-1/2 z-[9999] px-6 py-4 rounded-2xl text-white font-black text-sm shadow-2xl bg-${type === 'green' ? 'emerald' : 'blue'}-600 transition-all duration-500`;
    div.innerText = msg;
    document.body.appendChild(div);
    setTimeout(() => { div.style.opacity = "0"; setTimeout(() => div.remove(), 500); }, 4000);
}

function checkDailyReset(uid, data) {
    const now = new Date();
    let resetTime = new Date();
    resetTime.setHours(3, 0, 0, 0);
    if (now.getHours() < 3) resetTime.setDate(resetTime.getDate() - 1);
    const todayStr = resetTime.toDateString();
    if ((data.lastResetDay || "") !== todayStr) {
        const profitToMove = data.todayBalance || 0;
        db.ref('users/' + uid).update({
            todayBalance: 0,
            withdrawableBalance: Number(((data.withdrawableBalance || 0) + profitToMove).toFixed(2)),
            lastResetDay: todayStr
        });
    }
}

auth.onAuthStateChanged(u => {
    if (u) {
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('dashboard-section').classList.remove('hidden');
        document.getElementById('nav').classList.remove('hidden');
        db.ref('users/' + u.uid).on('value', snap => {
            const d = snap.val(); if (!d) return;
            checkDailyReset(u.uid, d);
            document.getElementById('welcome-msg').innerText = `أهلاً بك، ${d.username || 'مروجنا'} ✨`;
            document.getElementById('stat-today').innerText = `$${(d.todayBalance || 0).toFixed(2)}`;
            document.getElementById('stat-total').innerText = `$${(d.totalBalance || 0).toFixed(2)}`;
            document.getElementById('stat-withdrawable').innerText = `$${(d.withdrawableBalance || 0).toFixed(2)}`;
            document.getElementById('stat-clicks').innerText = d.clicks || 0;
            document.getElementById('ref-link').value = window.location.origin + window.location.pathname + "?ref=" + u.uid;
        });
        renderHistory(u.uid);
        if (ADMIN_EMAILS.includes(u.email)) {
            document.getElementById('admin-panel').classList.remove('hidden');
            loadAdminPanel();
        }
    } else {
        document.getElementById('auth-section').classList.remove('hidden');
        document.getElementById('dashboard-section').classList.add('hidden');
        document.getElementById('nav').classList.add('hidden');
    }
});

let isLoginMode = true;
async function handleAuth() {
    const e = document.getElementById('email').value, p = document.getElementById('password').value, n = document.getElementById('username').value;
    try {
        if (isLoginMode) await auth.signInWithEmailAndPassword(e, p);
        else {
            const r = await auth.createUserWithEmailAndPassword(e, p);
            await db.ref('users/' + r.user.uid).set({
                username: n, email: e, clicks: 0, todayBalance: 0, totalBalance: 0, withdrawableBalance: 0, lastResetDay: ""
            });
        }
    } catch (err) { showNotification(err.message, "blue"); }
}

function toggleAuthMode() {
    isLoginMode = !isLoginMode;
    document.getElementById('username').classList.toggle('hidden', isLoginMode);
    document.getElementById('auth-btn').innerText = isLoginMode ? "دخول" : "إنشاء حساب";
    document.getElementById('auth-switch').innerText = isLoginMode ? "إنشاء حساب جديد" : "لديك حساب؟ سجل دخول";
}

async function copyReferralLink() {
    try {
        const text = document.getElementById("ref-link").value;
        await navigator.clipboard.writeText(text);
        showNotification("تم نسخ الرابط ✅", "green");
    } catch { showNotification("فشل النسخ", "blue"); }
}

function renderHistory(uid) {
    db.ref('withdrawals').on('value', snap => {
        const list = document.getElementById('user-withdraw-history');
        const data = snap.val(); list.innerHTML = "";
        if (!data) return;
        Object.keys(data).reverse().forEach(k => {
            const w = data[k]; if (w.uid !== uid) return;
            const isPaid = w.status === "paid";
            list.innerHTML += `<div class="glass-card p-4 rounded-2xl flex justify-between items-center border border-white/5"><div class="text-right"><p class="text-lg text-white font-black">$${w.amount}</p><p class="text-[9px] text-slate-500 font-bold uppercase italic">${w.method}</p></div><div class="text-[10px] font-black ${isPaid?'text-emerald-400':'text-amber-400'}">${isPaid?'تم الدفع ✅':'قيد المراجعة ⏳'}</div></div>`;
        });
    });
}

function confirmWithdraw() {
    const amt = parseFloat(document.getElementById('w-amount').value), acc = document.getElementById('w-account').value.trim(), con = document.getElementById('w-contact').value.trim(), met = document.getElementById('w-method').value;
    if (!amt || amt < 7) return showNotification("الحد الأدنى 7$", "blue");
    if (!acc || !con) return showNotification("يرجى ملء الحقول", "blue");
    const uRef = db.ref('users/' + auth.currentUser.uid);
    uRef.once('value', snap => {
        const bal = snap.val().withdrawableBalance || 0;
        if (amt > bal) return showNotification("الرصيد غير كافٍ", "blue");
        uRef.update({ withdrawableBalance: Number((bal - amt).toFixed(2)) });
        db.ref('withdrawals').push({ uid: auth.currentUser.uid, username: snap.val().username, amount: amt, method: met, account: acc, contact: con, status: "pending", timestamp: Date.now() });
        showNotification("تم طلب السحب ✅", "green");
        document.getElementById('w-amount').value = "";
    });
}

function loadAdminPanel() {
    db.ref('withdrawals').on('value', snap => {
        const container = document.getElementById('admin-withdrawals'); container.innerHTML = "";
        const data = snap.val(); if (!data) return;
        Object.keys(data).reverse().forEach(key => {
            const w = data[key]; if (w.status === "paid") return;
            container.innerHTML += `<div class="glass-card p-4 rounded-2xl flex justify-between items-center border-r-4 border-amber-500"><div class="text-right"><h4 class="font-black text-white text-xs">${w.username}</h4><p class="text-xs text-amber-400 font-bold">$${w.amount}</p><p class="text-[9px] text-slate-500 uppercase italic">${w.method} - ${w.account} | ${w.contact}</p></div><button onclick="markAsPaid('${key}')" class="bg-emerald-500 text-white px-4 py-2 rounded-xl text-[10px] font-black">إتمام</button></div>`;
        });
    });
}

function markAsPaid(id) { db.ref('withdrawals/'+id).update({status:"paid"}); }
function logout() { auth.signOut(); }
window.addEventListener("pageshow", () => { document.getElementById('loading-screen').classList.add('hidden'); });

checkAndRedirect();
</script>
</body>
</html>
